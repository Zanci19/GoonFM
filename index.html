<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoonFM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main class="player">
      <h1 class="brand">GOON<span>FM</span></h1>

      <section class="visualizer-wrap" aria-label="Audio spectrum visualizer">
        <canvas id="spectrometer" width="460" height="110"></canvas>
        <button id="play-toggle" class="play-btn" aria-label="Play or pause">
          <span></span>
        </button>
      </section>

      <p class="now">Now playing</p>
      <p class="track">STING - DESERT ROSE</p>

      <audio id="radio" crossorigin="anonymous" preload="auto"></audio>
    </main>

    <script src="scripts/main.js" type="module"></script>
  </body>
</html>
